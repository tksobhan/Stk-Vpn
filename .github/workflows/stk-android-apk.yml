name: STK VPN Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  IS_GITHUB_ACTIONS: "1"
  FLUTTER_VERSION: "3.38.5"
  JAVA_VERSION: "17"

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Show tool versions
        run: |
          java -version
          flutter --version
          dart --version

      - name: Run rebrand script
        run: |
          chmod +x scripts/rebrand.sh
          ./scripts/rebrand.sh

      - name: Flutter pub get
        run: flutter pub get

      - name: Prepare Android dependencies
        run: make android-apk-prepare

      - name: Build release APK
        run: flutter build apk --release

      - name: Collect APKs
        run: |
          mkdir -p out
          find build/app/outputs/flutter-apk -type f -name "*.apk" -print
          cp build/app/outputs/flutter-apk/*.apk out/ || true
          ls -lah out

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stk-vpn-android-apk
          path: out/*.apk
          if-no-files-found: error
